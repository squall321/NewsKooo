# Prometheus scrape config for NewsKoo. The API exposes /metrics
# (prometheus_client). Point Grafana at this Prometheus for dashboards.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: newskoo-api
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          service: newskoo-api

  # If you run node_exporter / kafka_exporter / postgres_exporter, add them:
  # - job_name: node
  #   static_configs: [{ targets: ["localhost:9100"] }]
  # - job_name: kafka
  #   static_configs: [{ targets: ["localhost:9308"] }]
  # - job_name: postgres
  #   static_configs: [{ targets: ["localhost:9187"] }]
